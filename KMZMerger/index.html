<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMZ Merger - NQoS Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../shared.css">
</head>

<body>
    <nav class="navbar">
        <a href="../index.html" class="brand">
            <i class="fa-solid fa-earth-americas" style="color: var(--color-primary); font-size: 24px;"></i> <span
                style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 20px; color: var(--color-text); margin-left:8px; letter-spacing: -0.5px;">NQoS
                Tools</span>
        </a>
        <div class="nav-menu">
            <a href="../index.html" class="nav-item">ALL TOOLS</a>
        </div>
    </nav>
    <div class="tool-stage">
        <div class="tool-header">
            <h1>Merge KMZ Files</h1>
            <p>Combine multiple KMZ/KML files into a single master file.</p>
        </div>
        <div id="upload-view" class="view active">
            <div class="file-drop-container mode-single">
                <div class="file-drop-zone" id="drop-zone-main">
                    <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                    <h3 class="drop-title">Upload Multiple Files</h3>
                    <p class="drop-subtitle">Drag & drop your files here or click to select</p>
                    <button class="btn-select-file">
                        <i class="fa-solid fa-folder-open"></i> Select Files
                    </button>
                    <!-- allow multiple -->
                    <input type="file" id="file-input" multiple style="display:none;">
                    <div class="file-info"></div>
                </div>
            </div>
        </div>
        <div id="config-view" class="view hidden" style="width: 100%; max-width: 800px; text-align: left;">
            <div
                style="padding: 32px 0; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); transition: none; transform: none;">
                <div style="padding: 0 32px;">
                    <h3 style="margin-bottom: 24px; font-size: 20px; font-weight: 600; color: #2c3e50;">
                        <i class="fa-solid fa-gear" style="color: #95c11f; margin-right: 8px;"></i> Configure Merge
                    </h3>
                    <div style="margin-bottom: 24px; padding: 20px; background: #fafafa; border-radius: 8px;">
                        <p style="color: #7f8c8d; font-size: 14px;">Additional configuration options will go here.</p>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 32px; padding: 0 32px;">
                <button id="btn-cancel"
                    style="padding: 10px 20px; background: #eee; border: none; border-radius: 6px; cursor: pointer;">Cancel</button>
                <button class="btn-action-main" id="btn-process" style="font-size: 1rem; padding: 10px 30px;">Merge
                    Files</button>
            </div>
        </div>
        <div id="processing-view" class="view hidden" style="text-align: center;">
            <h3 style="margin-bottom: 20px;">Processing...</h3>
            <div class="progress-container"
                style="width: 100%; max-width: 400px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 0 auto;">
                <div id="progress-bar"
                    style="width: 0%; height: 100%; background: var(--color-primary); transition: width 0.3s;"></div>
            </div>
            <p id="progress-text" style="margin-top: 15px; color: #666;">Reading file...</p>
            <p id="progress-details" style="margin-top: 5px; font-size: 14px; color: #888;"></p>
        </div>
        <div id="result-view" class="view hidden" style="text-align:center;">
            <i class="fa-solid fa-check-circle" style="font-size: 60px; color: #95c11f; margin-bottom: 20px;"></i>
            <h2 style="margin-bottom:20px;">Merge Completed!</h2>
            <div id="result-summary" class="result-stats-board"></div>
            <button class="btn-action-main" id="btn-download">
                <i class="fa-solid fa-download"></i> Download Again
            </button>
            <div style="margin-top:20px;">
                <button id="btn-restart"
                    style="background:none; border:none; color:#666; text-decoration:underline; cursor:pointer;">Merge
                    more files</button>
            </div>
        </div>
    </div>
    <script src="../shared.js"></script>
    <script src="script.js"></script>
</body>

</html>
